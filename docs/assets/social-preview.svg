<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Suka.dev social preview</title>
  <desc id="desc">Suka.dev is a realtime coordination layer for AI coding agents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1118"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#18212f"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="0.45" stop-color="#2563eb"/>
      <stop offset="0.78" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#334155" stroke-width="1" opacity="0.42"/>
      <circle cx="0" cy="0" r="1.4" fill="#475569" opacity="0.45"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="640" fill="url(#grid)" opacity="0.72"/>

  <g opacity="0.95" filter="url(#shadow)">
    <rect x="706" y="112" width="404" height="326" rx="18" fill="#0f172a" stroke="#334155"/>
    <rect x="730" y="136" width="126" height="64" rx="10" fill="#f8fafc" stroke="#14b8a6" stroke-width="4"/>
    <rect x="900" y="126" width="136" height="64" rx="10" fill="#f8fafc" stroke="#2563eb" stroke-width="4"/>
    <rect x="805" y="252" width="148" height="64" rx="10" fill="#f8fafc" stroke="#f59e0b" stroke-width="4"/>
    <rect x="966" y="336" width="124" height="64" rx="10" fill="#f8fafc" stroke="#22c55e" stroke-width="4"/>
    <path d="M856 168 C880 166, 878 160, 900 158" fill="none" stroke="#94a3b8" stroke-width="2.5"/>
    <path d="M793 200 C808 232, 820 230, 834 252" fill="none" stroke="#94a3b8" stroke-width="2.5"/>
    <path d="M953 284 C978 300, 988 318, 1002 336" fill="none" stroke="#94a3b8" stroke-width="2.5"/>
    <path d="M900 158 C960 204, 926 230, 879 252" fill="none" stroke="#d97706" stroke-width="2.5" stroke-dasharray="8 8"/>
    <text x="793" y="164" text-anchor="middle" fill="#111827" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="800">Dashboard</text>
    <text x="968" y="154" text-anchor="middle" fill="#111827" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="800">Agents</text>
    <text x="879" y="280" text-anchor="middle" fill="#111827" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="800">Claims</text>
    <text x="1028" y="364" text-anchor="middle" fill="#111827" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="800">Repo Map</text>
  </g>

  <g transform="translate(88 96)">
    <rect width="82" height="82" rx="18" fill="url(#mark)" stroke="#f8fafc" stroke-width="5"/>
    <path d="M25 57 L40 42 L57 50" fill="none" stroke="#f8fafc" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M40 42 L55 24" fill="none" stroke="#f8fafc" stroke-width="5" stroke-linecap="round"/>
    <circle cx="25" cy="57" r="7" fill="#0f172a" stroke="#f8fafc" stroke-width="4"/>
    <circle cx="40" cy="42" r="7" fill="#0f172a" stroke="#f8fafc" stroke-width="4"/>
    <circle cx="57" cy="50" r="7" fill="#0f172a" stroke="#f8fafc" stroke-width="4"/>
    <circle cx="55" cy="24" r="7" fill="#0f172a" stroke="#f8fafc" stroke-width="4"/>
