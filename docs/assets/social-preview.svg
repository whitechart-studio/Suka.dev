  <text x="88" y="246" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="92" font-weight="850" letter-spacing="0">Suka.dev</text>
  <text x="92" y="315" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="650">Realtime coordination for AI coding agents</text>
  <text x="92" y="372" fill="#94a3b8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="26" font-weight="520">Live presence, work claims, conflict radar, repo map, and shared decisions.</text>

  <g transform="translate(92 448)">
    <rect width="164" height="44" rx="22" fill="#f8fafc" opacity="0.96"/>
    <text x="82" y="29" text-anchor="middle" fill="#0f172a" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="800">open source</text>
    <rect x="180" width="170" height="44" rx="22" fill="none" stroke="#334155" stroke-width="2"/>
    <text x="265" y="29" text-anchor="middle" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="750">local first</text>
    <rect x="366" width="196" height="44" rx="22" fill="none" stroke="#334155" stroke-width="2"/>
    <text x="464" y="29" text-anchor="middle" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="750">team ready</text>
