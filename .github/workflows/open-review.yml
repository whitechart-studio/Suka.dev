name: Open Review

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: open-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  danger-policy:
    name: Danger Policy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Danger policy review
        env:
          DANGER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx danger ci --dangerfile dangerfile.cjs

  reviewdog-diff-hygiene:
    name: Reviewdog Diff Hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Check changed diff hygiene
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          git diff --check "origin/${{ github.base_ref }}...HEAD" > diff-check.txt || true
          reviewdog -efm="%f:%l: %m" -name="diff-hygiene" -reporter=github-pr-review -filter-mode=diff_context -fail-level=error < diff-check.txt
