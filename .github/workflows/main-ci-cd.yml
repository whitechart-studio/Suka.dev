name: Main CI/CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: main-ci-cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-package:
    name: Build And Package
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify workspace
        run: npm run ci:verify

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: suka-build-${{ github.sha }}
          if-no-files-found: error
          retention-days: 14
          path: |
            README.md
            package.json
            package-lock.json
            apps/dashboard/dist
            packages/*/dist
            docs/wiki
